version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: smartcampus
      POSTGRES_USER: smartcampus
      POSTGRES_PASSWORD: smartcampus
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DJANGO_SECRET_KEY: change-me-in-prod
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: "*"
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: smartcampus
      DB_USER: smartcampus
      DB_PASSWORD: smartcampus
      DB_HOST: postgres
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      USE_SQLITE: "false"
      USE_ASYNC_TASKS: "true"
      ENABLE_REALTIME_PUSH: "true"
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

  celery:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A smartcampus worker --loglevel=info
    environment:
      DJANGO_SECRET_KEY: change-me-in-prod
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: "*"
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: smartcampus
      DB_USER: smartcampus
      DB_PASSWORD: smartcampus
      DB_HOST: postgres
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      USE_SQLITE: "false"
      USE_ASYNC_TASKS: "true"
      ENABLE_REALTIME_PUSH: "true"
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
